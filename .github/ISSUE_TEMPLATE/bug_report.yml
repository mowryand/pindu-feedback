name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open ...
        2. Click ...
    validations:
      required: false

  - type: input
    id: pindu-version
    attributes:
      label: Pindu version
      placeholder: e.g. 1.14.0
    validations:
      required: false

  - type: input
    id: anki-version
    attributes:
      label: Anki version
      placeholder: e.g. 24.11
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, error messages, or anything else that might help.
    validations:
      required: false
